<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#444"/></marker></defs><rect width="100%" height="100%" fill="#f8f8f8"/><rect x="70" y="70" width="430" height="420" rx="8" fill="white" stroke="#333" stroke-width="2"/><text x="285.0" y="94" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Before: Procedural State Machine</text><line x1="70" y1="106" x2="500" y2="106" stroke="#999"/><text x="82" y="128" font-family="Arial" font-size="13">enter_number(session, value):</text><text x="82" y="146" font-family="Arial" font-size="13">  if mode == welcome: PIN</text><text x="82" y="164" font-family="Arial" font-size="13">  elif mode == withdraw: amount</text><text x="82" y="182" font-family="Arial" font-size="13">  elif mode == deposit: amount</text><text x="82" y="200" font-family="Arial" font-size="13"></text><text x="82" y="218" font-family="Arial" font-size="13">press_ok(session):</text><text x="82" y="236" font-family="Arial" font-size="13">  if mode == welcome: auth</text><text x="82" y="254" font-family="Arial" font-size="13">  elif mode == withdraw: withdraw</text><text x="82" y="272" font-family="Arial" font-size="13">  elif mode == deposit: deposit</text><text x="82" y="290" font-family="Arial" font-size="13"></text><text x="82" y="308" font-family="Arial" font-size="13">Every handler asks:</text><text x="82" y="326" font-family="Arial" font-size="13">“What mode am I in?”</text><rect x="700" y="70" width="430" height="420" rx="8" fill="white" stroke="#333" stroke-width="2"/><text x="915.0" y="94" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">After: State Pattern</text><line x1="700" y1="106" x2="1130" y2="106" stroke="#999"/><text x="712" y="128" font-family="Arial" font-size="13">session.enter_number(value)</text><text x="712" y="146" font-family="Arial" font-size="13">  delegates to current state</text><text x="712" y="164" font-family="Arial" font-size="13"></text><text x="712" y="182" font-family="Arial" font-size="13">WelcomeState.enter_number = PIN</text><text x="712" y="200" font-family="Arial" font-size="13">WithdrawState.enter_number = amount</text><text x="712" y="218" font-family="Arial" font-size="13">DepositState.enter_number = amount</text><text x="712" y="236" font-family="Arial" font-size="13"></text><text x="712" y="254" font-family="Arial" font-size="13">The state already knows</text><text x="712" y="272" font-family="Arial" font-size="13">what the input means.</text><line x1="500" y1="280" x2="700" y2="280" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/><text x="600.0" y="274.0" text-anchor="middle" font-family="Arial" font-size="12">structural move</text><rect x="405" y="540" width="390" height="80" rx="8" fill="white" stroke="#333" stroke-width="2"/><text x="600.0" y="564" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">Key Shift</text><line x1="405" y1="576" x2="795" y2="576" stroke="#999"/><text x="417" y="598" font-family="Arial" font-size="13">Procedural systems treat state as data.</text><text x="417" y="616" font-family="Arial" font-size="13">OO systems let state reorganize behavior.</text></svg>